# Meson cross-compilation definition for x86_64-linux-musl (AstryxOS target)
# Used by pixman, cairo, harfbuzz when cross-compiled with musl toolchain.
#
# Place this file at: scripts/meson-musl-cross.ini

[binaries]
c       = 'x86_64-linux-musl-gcc'
cpp     = 'x86_64-linux-musl-g++'
ar      = 'x86_64-linux-musl-ar'
strip   = 'x86_64-linux-musl-strip'
pkgconfig = 'pkg-config'

[host_machine]
system      = 'linux'
cpu_family  = 'x86_64'
cpu         = 'x86_64'
endian      = 'little'

[properties]
c_args      = ['-O2', '-fPIC', '-fno-omit-frame-pointer']
c_link_args = ['-static']
