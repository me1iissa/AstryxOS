[package]
name = "astryx-kernel"
version.workspace = true
edition.workspace = true

[features]
default = []
# `sched-pick-xcheck` — Perf P2 phase 2b live pick-equivalence cross-check. On
# every scheduling pass (SMP=1 only) the per-CPU runqueue pick is computed
# alongside the authoritative legacy table-scan pick and any divergence is
# logged + counted (`sched::percpu::PICK_DIVERGENCES`). The legacy result still
# drives the switch, so this is observation-only — the live half of the Test
# 648 proof. Off by default and NOT pulled into `test-mode` (it does per-sample
# heap allocation off the schedule() path, which must stay allocation-free in
# the default kernel); enable explicitly for a dedicated equivalence soak. The
# deterministic Test 648 is the authoritative merge gate; this is supplementary
# live evidence.
sched-pick-xcheck = []
# `heap-canary` — fence every live kernel-heap allocation with front/rear
# magic red-zone words (validated on free) so an out-of-bounds write that
# clobbers free-list metadata is caught at free-time, naming the victim
# block, instead of surfacing later as a silent free-list-walk freeze.  The
# always-on free-list pointer validation (alignment/range/bounded walk) needs
# no feature; this gates only the per-allocation canaries (a few words of
# overhead per allocation).  Pulled in by `test-mode` and `firefox-test` so
# both the kernel test suite and the Firefox debug path get the protection by
# default.  Public refs: Rust `core::alloc::{GlobalAlloc, Layout}`; the
# generic allocator red-zone / guard-byte technique; System V AMD64 ABI §3.1.2
# (natural alignment of fundamental types).
heap-canary = []
# `test-mode-trace` — the high-frequency per-syscall / per-poll / per-resolve
# diagnostic serial emitters, split out of `test-mode` so the kernel test
# suite keeps its historical serial output (`test-mode` = functional + trace)
# while a future fast-turnaround test profile can drop the spew.  Pure
# diagnostic: gating it off changes NO kernel behaviour, only what is
# transcribed to COM1.  Each emitted byte is one PIO VM-exit under KVM
# (Intel SDM Vol. 3C §25 I/O-instruction VM-exits; NS16550A THR-write model),
# so on the hot path the spew dominates wall-clock.
test-mode-trace = []
test-mode = ["heap-canary", "test-mode-trace"]
# `screenshot-b64-dump` — opt-in for Test 198 (GDI PNG screenshot) to base64-
# encode the rendered 1.44 MB boot-splash PNG over COM1 as the chunked
# `[SCREENSHOT-B64:N/M]` stream (~25k lines) that the harness `read-png`
# subcommand decodes back to a host PNG.  Off by default and DELIBERATELY NOT
# pulled into `test-mode`: the dump is host-EXTRACTION only — Test 198's
# pass/fail is decided by the in-guest PNG-signature check (`signature_ok=true`)
# BEFORE the dump, so gating the dump off changes NO test outcome, only what is
# transcribed to COM1.  CI never invokes `read-png`, so for CI the dump is pure
# UART saturation: at ~25k synchronous PIO THR-write lines (Intel SDM Vol. 3C
# §25 I/O-instruction VM-exits; NS16550A THR-write model) it dominates the
# kernel-smoke wall-clock and, racing a faulting process's serial spew under
# `-smp 2`, can push the suite past the 900 s watchdog.  Enable only when a
# human/agent actually wants the boot-splash PNG extracted (the harness sets it
# on the `read-png` build path).
screenshot-b64-dump = []
gui-test = []
# `firefox-test-core` — the FUNCTIONAL behaviour the Firefox bring-up path
# needs to RUN: heap-canary fencing, the FF workload selection + launch in
# main.rs, kernel-stack pre-alloc, page-cache pre-population, the syscall-ring
# PID-tracking plumbing, the demand-fault / refcount / TLB bring-up paths, the
# ghost-hist summary, and the out.png emit.  NONE of this is a hot-path
# `serial_println!`; gating ONLY on core gives a fast, low-serial boot that
# still runs Firefox identically.
firefox-test-core = ["heap-canary"]
# `firefox-test-trace` — ALL the high-frequency diagnostic serial emitters the
# Firefox path historically printed per-syscall: the [FF/stderr] / [FF/write]
# stdout/stderr mirror (the single largest serial source — ~78% of a real
# 45 MB boot log), [POLL_RET], the per-component [VFS/resolve] trace, and the
# [FUTEX_WAIT_REG]/[FUTEX_WAKE]/[FUTEX_TIMEDOUT]/[FUTEX_WAKE_REQ]/
# [FUTEX_WAKE_GHOST*] traces.  Gating these off makes a perf/render/CI boot
# emit <2 MB of serial instead of ~45 MB, collapsing the synchronous PIO
# VM-exit cost (Intel SDM Vol. 3C §25 I/O-instruction VM-exits).  Pure
# diagnostic — no correctness role.  Depends on `firefox-test-core` because the
# trace emitters reuse core-only diagnostic plumbing (e.g. the syscall-ring
# `dump_futex_wait_stack` rbp-chain walker) — trace is a strict superset of the
# functional core, never a standalone.
firefox-test-trace = ["firefox-test-core"]
# Backward-compatible super-feature: `--features firefox-test` enables both the
# functional core and the full diagnostic trace, so existing debugging
# invocations are byte-identical to before this split.  Perf/render/CI boots
# enable only `firefox-test-core` for the fast, low-serial profile.
firefox-test = ["firefox-test-core", "firefox-test-trace"]
# `fork-cow-trace` — the per-fork [FORK-COW] page-table dump in
# `VmSpace::clone_for_fork` (a START line, one line per VMA — ~100 per Firefox
# process — a PML4-present line per populated top-level slot, and a total
# line).  This was historically ALWAYS-ON (no cfg gate), so it taxed EVERY
# fork(2) in EVERY build including stock production.  Off by default now;
# enable only when debugging the CoW page-table walk.  The cr3-mismatch WARN
# and the OOM line in the same function stay UNCONDITIONAL — they are rare,
# real signals, not hot-path chatter.
fork-cow-trace = []
# X11 "hello world" pivot — launches Alpine's xeyes binary (~28 KB musl PIE,
# linked against libX11/libXt/libXmu/libxcb) as the test workload instead of
# Firefox.  Shares the in-kernel Xastryx server (kernel/src/x11/) with
# firefox-test, but skips the libxul SSP-canary saga path entirely:
# xeyes does no vfork/posix_spawn, no JIT, no Rust panic strings, no
# multi-process IPC.  Used as an orthogonal probe: if xeyes runs to its
# event loop the kernel personality stack is functional for real Linux
# X11 binaries; if it crashes, the failure is isolated from libxul.
# Mutually exclusive with firefox-test at the main.rs cfg-gate level —
# both enabled would race for Xastryx + the visible-window slot.
xeyes-test = []
# busybox-test — CLI-tool probe pivot (PIVOT-B, 2026-05-23).  Launches the
# Alpine busybox-static binary (~1 MB stripped, statically-linked) and runs
# a short battery of standard applets sequentially (`echo`, `uname -a`,
# `ls -la /`, `cat /etc/os-release`, `sh -c '...'`, `du -sh /bin`), capturing
# each child's stdout to the serial log.  Validates the kernel personality
# stack for upstream Linux CLI binaries outside the X11 / libxul paths:
# static ELF loader, brk(2), mmap(2) for argv/env, write(2) to pipe,
# readdir/getdents(2), exit_group(2).  No dynamic linker, no PLT/GOT, no TLS
# surprises.  Mutually exclusive with the other *-test cargo features at
# the main.rs cfg-gate level (all share the BSP idle slot).  Requires the
# data.img to contain /bin/busybox; run `scripts/create-data-disk.sh
# --busybox --force` (or pass ASTRYXOS_BUSYBOX=1) before booting.
# Public refs: BusyBox <https://busybox.net/>, POSIX exec / write / read,
# os-release(5).
busybox-test = []
# httpd-test — kernel-as-HTTP-server demo (PIVOT-C, 2026-05-23).  Opens a
# TCP listener on port 8080 from a dedicated PRIORITY_HIGH kernel pump
# thread (same shape as the existing kdb pump on 9999) and answers
# inbound HTTP/1.1 GET requests with a static HTML body read from the
# kernel-managed in-RAM tmpfs at /srv/index.html.  Exercises the kernel
# net stack on the SERVER side: tcp::listen, SYN-handling, RX-to-kernel
# (the inverse of the wget-test RX-to-userspace gate), HTTP/1.1
# response framing, and orderly TCP close.  No userspace binary, no
# AF_INET accept(2) syscall — the responder lives entirely inside the
# kernel and the strategic claim "kernel can answer external HTTP
# clients" is proven byte-for-byte at the host curl boundary.  The
# harness adds a `--http-host-port N` option that injects a SLIRP
# hostfwd rule forwarding host-port N to guest 10.0.2.15:8080.
# Mutually exclusive with the other *-test cargo features at the
# main.rs cfg-gate level (all share the BSP idle slot).  Public refs:
# RFC 7230 (HTTP/1.1) <https://datatracker.ietf.org/doc/html/rfc7230>,
# RFC 793 (TCP), POSIX socket(2)/listen(2).
httpd-test = []
# sshd-test — SSH-service userspace demo (PIVOT-D, 2026-05-23).  Launches
# Alpine's dropbear SSH daemon (~260 KB, musl-linked) as a userspace
# process listening on guest TCP port 22.  The harness adds
# `--ssh-host-port N` which injects a SLIRP hostfwd rule forwarding
# host-port N to guest 10.0.2.15:22 so a host `ssh -p N root@127.0.0.1`
# reaches the dropbear inside.  Validates the kernel personality stack
# end-to-end on the SERVER side: socket(2), bind(2), listen(2), accept(2),
# fork(2) per-connection, plus the full musl + crypto + RSA/Ed25519
# host-key handshake from the SSH-2 RFCs.
#
# accept(2) note: AF_INET accept(2) is currently a stub returning
# -EAGAIN (kernel/src/subsys/linux/syscall.rs:1651).  Real accept is
# under separate dispatch.  Until that lands, sshd-test boots dropbear
# and the daemon enters the accept(2) loop spinning on EAGAIN; no
# client SSH session ever completes.  The boot still validates the
# staging path, config files, host-key load, socket(2)/bind(2)/listen(2),
# and exercises dropbear's main-thread initialisation surface (which
# may surface NEW kernel-side gaps unrelated to accept(2)).
#
# Mutually exclusive with the other *-test cargo features at the
# main.rs cfg-gate level (all share the BSP idle slot).  Requires the
# data.img to contain /usr/sbin/dropbear; run `scripts/create-data-disk.sh
# --sshd --force` (or pass ASTRYXOS_SSHD=1) before booting.
# Public refs: dropbear <https://matt.ucc.asn.au/dropbear/dropbear.html>,
# RFC 4252 (SSH userauth), RFC 4253 (SSH transport), RFC 4254 (SSH
# connection protocol), POSIX socket(2)/bind(2)/listen(2)/accept(2).
sshd-test = []
# wget-test — network-stack CLI probe (PIVOT-B Phase 2, 2026-05-23).  Same
# Alpine busybox-static binary as busybox-test, but launched as
# `busybox wget -q -O - http://<host>:<port>/` to fetch a small HTTP
# response.  Exercises socket(2) AF_INET / connect(2) / sendto(2) +
# recvfrom(2) on TCP, the kernel TCP retransmit / ACK path, and write(2)
# of the response body to a parent-visible pipe.  The default fetch
# target is `http://10.0.2.2:8888/` (QEMU SLIRP gateway) — a tiny
# `python3 -m http.server` instance on the host is the canonical
# responder; if no responder is running the test still validates the
# socket / DNS path up to the connect-refused boundary and reports the
# named gate.  See QEMU SLIRP docs
# <https://www.qemu.org/docs/master/system/devices/net.html#network-options>
# and RFC 7230 (HTTP/1.1).  Mutually exclusive with the other *-test
# cargo features.  Requires data.img to contain /bin/busybox.
wget-test = []
# tls-test — TLS userspace probe (PIVOT-I1a, 2026-05-23).  Drives the
# Alpine OpenSSL 3.x CLI (/usr/bin/openssl) through `openssl s_client
# -connect <host>:<port>` against a host-side openssl s_server (default
# 10.0.2.2:8443, conventional QEMU SLIRP gateway alias) to validate
# end-to-end TLS 1.2 / 1.3 handshake from inside an AstryxOS-hosted
# Linux personality binary.  Also runs `busybox wget` against an
# https:// URL to exercise the libssl + ssl_client helper path that
# real-world HTTPS clients use.  Proves the userspace TLS substrate
# (libssl.so.3, libcrypto.so.3, /etc/ssl/cert.pem, ossl-modules/legacy.so)
# is correctly staged and that no kernel-side bug intercepts the cipher
# negotiation, certificate verification, or symmetric encryption paths.
# Mutually exclusive with the other *-test cargo features at the
# main.rs cfg-gate level.  Requires data.img to contain /usr/bin/openssl,
# /bin/busybox, /usr/bin/ssl_client, libssl/libcrypto, and the CA bundle
# (run `scripts/create-data-disk.sh --tls --busybox --force` or
# `ASTRYXOS_TLS=1 ASTRYXOS_BUSYBOX=1`).  Public refs: RFC 8446 (TLS 1.3)
# <https://datatracker.ietf.org/doc/html/rfc8446>, RFC 5246 (TLS 1.2)
# <https://datatracker.ietf.org/doc/html/rfc5246>, OpenSSL s_client(1)
# <https://www.openssl.org/docs/man3.0/man1/openssl-s_client.html>.
tls-test = []
# oracle-test — Oracle endpoint agent first-boot demo (PIVOT-I2, 2026-05-23).
# Launches a production GLIBC-linked endpoint-agent binary (caller-supplied
# at staging time, ~5 MiB) with
# `--mode console --once` so it runs a single observation cycle and exits.
# Validates the AstryxOS kernel's ability to host a real glibc+tokio
# Linux server-agent: dynamic linker + glibc + libssl3/libcrypto3 +
# tokio runtime + signalfd + epoll + clone3 + /proc + /sys reads.  This
# is a first-boot VALIDATION pass — the goal is to reach the first
# non-recoverable failure and name it, not to make oracle fully
# functional.  Subsequent fixes (sysfs network shim, sd_notify, etc.)
# are tracked in docs/INFRASVC_ORACLE_AUDIT_2026-05-23.md.
#
# Mutually exclusive with the other *-test cargo features at the
# main.rs cfg-gate level.  Requires the data.img to contain
# /usr/bin/oracle plus the glibc + host libssl3 stage; run
# `scripts/create-data-disk.sh --oracle --force` (or
# `ASTRYXOS_ORACLE=1`) before booting.  Public refs:
# tokio <https://tokio.rs/>, sd_notify(3)
# <https://www.freedesktop.org/software/systemd/man/sd_notify.html>,
# systemd.service(5)
# <https://www.freedesktop.org/software/systemd/man/systemd.service.html>.
oracle-test = []
# oracle-daemon-test — Oracle endpoint agent daemon-mode bring-up
# (PIVOT-I2 Phase D, 2026-05-23).  Same staging requirements as
# oracle-test (the staged glibc + libssl3 substrate, /usr/bin/oracle on
# the data disk) but launches oracle WITHOUT --once and overrides
# INFRASVC_SYNC_ENABLED=true + INFRASVC_SYNC_URL=http://10.0.2.2:8088/heartbeat
# (the conventional QEMU SLIRP gateway alias for the host-side
# `scripts/oracle-stub-conflux.py` Python responder).  Captures heartbeats
# end-to-end and validates the *full* AstryxOS server-agent substrate:
# tokio multi-thread runtime + reqwest+hyper TCP outbound + heartbeat
# emission timer.  Per audit §7 ("Minimum viable demo — defer I1 path")
# this swaps plain-HTTP for the eventual WSS/TLS substrate so end-to-end
# can be proven before the TLS soak completes.  Mutually exclusive with
# the other *-test cargo features at the main.rs cfg-gate level.  Run
# `python3 scripts/oracle-stub-conflux.py --port 8088 --log /tmp/stub.jsonl &`
# on the host before booting.  Public refs: RFC 9110 (HTTP semantics)
# <https://www.rfc-editor.org/rfc/rfc9110.html>, QEMU SLIRP
# <https://www.qemu.org/docs/master/system/devices/net.html#network-options>.
oracle-daemon-test = []
# pivot-e-test — PIVOT-E core-utilities demo (2026-05-24).  Verifies the
# Tier A busybox-static surface (305 applets, statically-linked,
# previously staged by install-busybox-cli.sh) by enumerating
# `busybox --list` and running a curated battery (grep, sed, awk, find,
# head, tail, wc, cat, sort, uniq, md5sum, sha256sum, du, df, vi as
# `vi -v`).  Then launches each Tier B standalone binary staged by
# install-pivot-e.sh — `/usr/bin/curl --version`, `/usr/bin/jq '.'`,
# `/bin/tar --version`, `/usr/bin/curl http://10.0.2.2:8888/` — to
# confirm the AstryxOS kernel can host non-busybox musl-PIE Linux
# binaries with non-trivial DT_NEEDED closures (libcurl + zlib +
# nghttp2 + libpsl + zstd + libssl + libcrypto for curl).  Each
# child runs as its own process with stdout captured to the serial
# log via the same pipe-attach pattern as busybox_demo.  Mutually
# exclusive with the other *-test cargo features at the main.rs
# cfg-gate level (all share the BSP idle slot).  Requires the
# data.img to contain /bin/busybox + /usr/bin/curl + /usr/bin/jq +
# /bin/tar (run `scripts/create-data-disk.sh --pivot-e --force`).
# Public refs: BusyBox <https://busybox.net/>, curl
# <https://curl.se/docs/manpage.html>, jq
# <https://stedolan.github.io/jq/manual/>, GNU tar
# <https://www.gnu.org/software/tar/manual/tar.html>, POSIX exec(2)
# / read(2) / write(2).
pivot-e-test = []
# pivot-e-tui-test — PIVOT-E Tier C TUI utilities demo (2026-05-24).
# Verifies the four interactive ncurses utilities staged by
# install-pivot-e-tui.sh: nano, vim, htop, tmux.  Each binary is loaded
# via the PR #450 per-pair PTY substrate (/dev/ptmx, /dev/pts/N, TCGETS,
# TCSETS, TIOCGWINSZ, TIOCSPGRP) and the libncursesw DT_NEEDED closure
# resolved by ld-musl.  The runner invokes a non-interactive smoke for
# each utility (--version / -V / -h / ls) that exercises the full ELF +
# linker + ncurses-init path without requiring an attached PTY stdin.
# Major-win threshold: 2-of-4 utilities exit cleanly (PASS); 3-of-4
# means the substrate is robust enough for richer interactive demos.
# Mutually exclusive with other *-test features at the main.rs gate.
# Requires data.img staged by `scripts/create-data-disk.sh --pivot-e-tui`.
# Public refs: GNU nano <https://www.nano-editor.org/>, Vim
# <https://vimhelp.org/>, htop <https://htop.dev/>, tmux
# <https://github.com/tmux/tmux/wiki>, ncurses(3X)
# <https://invisible-island.net/ncurses/man/ncurses.3x.html>,
# terminfo(5) <https://invisible-island.net/ncurses/man/terminfo.5.html>.
pivot-e-tui-test = []
# pivot-e-git-test — PIVOT-E Tier D git demo (2026-05-24).  Verifies the
# Alpine `git` binary staged by install-pivot-e-git.sh on top of the
# Tier B substrate.  Runs a local-only "init / add / commit / log /
# cat-file" smoke against /tmp/repo, with the kernel runner setting
# GIT_EXEC_PATH=/disk/usr/bin so git's helper-exec lookup resolves to
# the real binary (Alpine ships /usr/libexec/git-core/git as a symlink;
# FAT32 has no symlinks).  Mutually exclusive with the other *-test cargo
# features at the main.rs cfg-gate level (all share the BSP idle slot).
# Requires data.img staged by `scripts/create-data-disk.sh --pivot-e-git`.
# Public refs: git(1) <https://git-scm.com/docs/git>,
# git-config(7) <https://git-scm.com/docs/git-config>,
# gitrepository-layout(5)
# <https://git-scm.com/docs/gitrepository-layout>,
# libpcre2 <https://www.pcre.org/current/doc/html/pcre2.html>,
# libexpat <https://libexpat.github.io/>.
pivot-e-git-test = []
# Opt-in for the userspace alias_test page-aliasing reproducer (Test 44b).
# Spawns 8 worker threads via raw clone(CLONE_VM|CLONE_THREAD|CLONE_SIGHAND)
# doing MAP_PRIVATE mmap churn; runs >100k page faults; sometimes wedges
# under CI watchdog limits.  Master CI runs without it until the
# underlying worker-thread wedge is resolved; enable for diagnostic runs.
alias-test = []
# Opt-in for the six X11-server protocol-conformance tests (251-256)
# introduced alongside PR #317 (SendEvent routing, ICCCM atom stability,
# PropertyNotify mask, global focus).  Each test in isolation completes,
# but the suite as a whole interacts with firefox_oracle / glibc_hello
# fixtures in a way that pushes wall-clock past the 900 s CI watchdog
# budget.  Master CI runs without them until the interaction is
# investigated; X11 functional changes remain in effect regardless.
x11-tests = []
# Opt-in for the three native-core hardening tests (258-260) introduced
# alongside PR #324 (mm/refcount CAS underflow safety, OB refcount +
# handle-table integration, scheduler starvation diagnostic counter).
# Each test in isolation completes under `--features test-mode` but the
# cumulative wall-clock budget overruns the 900 s CI watchdog when
# combined with firefox-test fixtures.  Master CI runs without them
# until the wall-clock interaction is investigated; native-core
# function-level changes (mm/refcount CAS, ob refcount, sched
# STARVATION_BURST emit) remain in effect regardless of this gate.
native-core-tests = []
# W215 Arm-1 diagnostic infrastructure: the page-cache CRC walker
# (`mm/w215_crc.rs`, ~2 MiB BSS shadow table), the cross-CPU DR0
# write-watchpoint plumbing (`arch/x86_64/debug_reg.rs`, IPI vector 0xF1),
# and the matching `record_insert`/`record_evict` hooks in
# `mm/cache.rs`.  Opt-in because the shadow table alone adds ~2 MiB of
# BSS that the bootloader-side `kernel_size = file_size` accounting does
# not reserve (the flat-binary `kernel.bin` excludes BSS), exposing a
# latent PMM-vs-BSS overlap that can corrupt kernel page tables during
# the firefox-test page-cache prepopulate burst.  Gating the diagnostic
# behind its own feature keeps the demo path's BSS small while
# preserving on-demand investigative access.  Implies `firefox-test`
# because the diagnostic shares the firefox-test cache instrumentation.
w215-diag = ["firefox-test"]
# #582 torn-saved-RFLAGS-slot writer probe.  Arms a DR0 8-byte data-write
# watch on context-switch victims' saved-RFLAGS slots
# (`Thread::context.rsp + 0`) and classifies the writer of any store to
# that slot as the legitimate `switch_context_asm` re-save versus an
# out-of-band RIP (the kernel-mode `#DB`/UNEXPECTED_KERNEL_MODE_TRAP root).
# Diagnostic-only; pulls in `w215-diag` for the shared DR0–DR3 +
# `handle_db_exception` plumbing.  Refs: Intel SDM Vol. 3B §17.2.4 (DR
# data-write breakpoints), §17.3.1.1 (trap-after-retire).
# Depends only on `firefox-test-core` (NOT the full trace bundle) so the
# timing-sensitive SMP race is not perturbed by the per-syscall serial
# firehose; the shared DR0-DR3 + handle_db_exception plumbing is compiled
# in via the widened module gate any(w215-diag, 582-diag).
582-diag = ["firefox-test-core"]
# W133: opt-out for cross-CPU TLB shootdown.  Default builds run the full
# shootdown protocol (IPI vector 0xF0, per-CPU active-CR3 mask).  Enable
# this feature only for bisect/baseline runs where you want to compare
# against the pre-PR behaviour — correctness on SMP requires shootdown.
tlb-shootdown-off = []
# Opt-in "soft-pass" network tests that depend on QEMU SLIRP actually
# delivering ICMP echo replies and forwarding DNS queries.  These tests
# (Test 5 ping 8.8.8.8, Test 6 DNS, Test 32 IPv6 DNS, Test 33 IPv6 ping)
# historically passed even when the operation returned no result, which
# made genuine network-stack regressions invisible in CI.  They are now
# off by default and only built into the runner when this feature is
# enabled alongside `test-mode`.  See docs/HARNESS.md.
network-tests = []
# Re-enables test 82 (Win32 PE32+ hello_win32.exe). Currently hangs the
# headless runner — the embedded PE spins in Ring 3 without calling
# ExitProcess under the current scheduler timing. Off by default.
win32-pe-test = []
# Keep the old 8x16 bitmap rectangle placeholder for title-bar text instead of
# using the GDI text engine. Disabled by default; re-enable if the GDI path
# triggers any rendering issue before it is fully validated.
bitmap-title-fallback = []
# Tier-0 syscall tracing. Emits one `[SC] pid=.. tid=.. nr=.. rip=.. a1=.. a2=.. a3=..`
# line per Linux syscall entry on the serial console. Off by default; enable
# alongside `firefox-test` when debugging user-mode regressions via
# `qemu-harness.py grep <sid> '^\[SC\] '`. See docs/HARNESS.md.
syscall-trace = []
# Meta-feature for the differential bytestream harness (INFRA-1, 2026-05-23).
# Pulls in firefox-test (which auto-tracks user-process PIDs into the
# syscall ring) and syscall-trace (which emits the [SC]/[SC-RET] pair
# consumed by `scripts/qemu-harness.py differential-soak`).  No additional
# kernel code is enabled — this exists purely so agents can pass a single
# canonical feature string instead of remembering the exact combination.
# See docs/DIFFERENTIAL_HARNESS_2026-05-23.md.
differential-trace = ["firefox-test", "syscall-trace"]
# Verbose firefox-test tracing.  By default `firefox-test` keeps only the
# essential per-syscall pair (`[SC]` / `[SC-RET]` under `syscall-trace`) plus
# boot banners and the periodic `tick=...` heartbeat — the minimum signal
# needed to measure demo throughput.  Enable this flag to also emit
# `[LINUX-SYS]`, `[MMAP]`, `[FFTEST/mmap-so]`, and `[SC-USTACK]` traces, which
# are useful when symbolising libxul stacks or debugging early mmap failures
