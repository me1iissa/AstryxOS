[package]
name = "astryx-kernel"
version.workspace = true
edition.workspace = true

[features]
default = []
test-mode = []

[dependencies]
astryx-shared = { path = "../shared" }
spin = "0.9"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = 2
lto = true
debug = 2
strip = "none"
