# with ZERO `[KSTACK/TIER]` and ZERO `[KSTACK/CANARY-FAIL]` records — i.e.
# the multi-tier fallback never engaged and the writer is NOT in the
# brk(2) / munmap(2) paths PR #395 named.  D20 hooks every thread-creation
# site in `proc/mod.rs` (`create_thread`, `create_thread_blocked`,
# `clone_for_fork`, `clone_for_thread`) via `note_kstack_alloc(pid, tid,
# base, span)` and, for the first 6 PID-2 thread creations, arms a
# write-only DR on `[kernel_stack_base, +8)` via the K2b primitive
# `arm_linear_watchpoint` (PR #356).  The existing `handle_db_exception`
# path emits `[W215/DR-WATCH-FIRE] kind_tag=6 …` with the writer's RIP /
# CS / RFLAGS / CR3 + 8 qwords of stack context — per Intel SDM Vol. 3B
# §17.3.1.1 each fire names one retired writer.  Diagnostic-only; default
# builds remain byte-identical when off.  Depends on `firefox-test`
# (trace formatters) and `w215-diag` (DR plumbing).
# Refs: Intel SDM Vol. 3B §17.2.4 (DR0–DR3, DR7), §17.3.1.1 (data-
# breakpoint trap timing); x86_64 SysV ABI §3.4.1 (stack-frame budgeting);
# CWE-121 (stack-based buffer overflow).
d20-kstack-canary-watch = ["firefox-test", "w215-diag"]
# D21 — write-only DR watchpoint on PID 1's user-mode saved-canary stack
# slot at the moment of the `CLONE_VM|CLONE_VFORK` PRE-block.  After PRs
# #388 → #400 closed the kernel-mode `STACK_CANARY_CORRUPT` class, 2/2
# fresh-master trials reproduce a user-mode SSP failure on PID 1: #GP at
# RIP `ld-musl-x86_64.so.1 + 0x1c7f9`, which `objdump -d` identifies as
# musl's `__stack_chk_fail` two-byte stub (`f4 c3` = HLT;RET; HLT from
# CPL=3 raises #GP per Intel SDM Vol. 2A).  AstryxOS encodes that as
# `exit_group(-13)`.  The TCB master canary at `FS:0x28` is stable
# across the vfork window per the existing `[VFORK/CANARY]` snapshots,
# so the corruption is on a stack-frame saved-canary slot.  D21 walks
# the parent's user RBP chain from the saved syscall frame, finds the
# libxul SSP-instrumented caller's `[rbp-8]` slot (System V AMD64 ABI
# §3.2.2 + GCC SSP convention), and arms a write-only DR on it via
# `arm_linear_watchpoint(va, 8, WATCH_KIND_D21_USER_CANARY)`.  The
# existing `handle_db_exception` path emits `[W215/DR-WATCH-FIRE]
# kind_tag=7 …` naming the writer's RIP / CS / CR3 (Intel SDM Vol. 3B
# §17.3.1.1 — each fire names one retired writer).  Hook site:
# `subsys/linux/syscall.rs` PRE-block tails for clone(2)/clone3(2)
# alongside `vfork_diag::snapshot_canaries` / `arm_master_canary_watch`.
# Diagnostic-only; default builds remain byte-identical when off.
# Depends on `firefox-test` (path gating + thread table) and `w215-diag`
# (DR plumbing + handle_db_exception).
# Refs: Intel SDM Vol. 3B §17.2.4 (DR0–DR3, DR7), §17.3.1.1 (data-
# breakpoint trap-after-retire); Intel SDM Vol. 2A (`HLT`); Intel SDM
# Vol. 3A §4.10 (TLB management); System V AMD64 ABI §3.2.2 (stack
# frame layout), §3.4.5.2 (SSP); POSIX `vfork(3p)`; CWE-121.  Prior
# art: PR #399 (D20 kernel-stack canary), PR #382 (D16 user-VA SSP).
d21-user-canary-watch = ["firefox-test", "w215-diag"]
# D22 — PHYS_OFF channel companion to D21 for user-canary phys-aliasing
# detection (Wave 13).  After PR #404 (D21 linear-VA arm) captured user-
# canary writers as legitimate musl prologue pushes, and PR #406 / PR #407
# rejected mechanisms A (alignment), B (signal-frame), B1/B2 (substitution
# gate sub-shapes), and C (kstack drift), the convergent verdict is
# Mechanism D — phys-aliasing on the user stack (same class as PR #248
# H3a/H3b on file-backed shared cache).  D22 mirrors PR #356's K2b two-
# channel pattern: at the same vfork-PRE-block hook D21 uses, arms a
# linear watchpoint on the canary VA AND a PHYS_OFF mirror on the
# observed backing physical frame.  The new `record_d22_fire` hook in
# `handle_db_exception` re-walks the user VA under the firing CR3 (Intel
# SDM Vol. 3A §4.6) to capture `phys_at_write`; the read-side
# `record_ssp_check` hook in `ssp_diag::probe_gp_at_ssp_fail` emits
# `phys_at_read` at the moment of the SSP `#GP` trap.  The dispositive
# comparison is `phys_at_write != phys_at_read` for the same `tid:pid`
# pair — Mechanism D confirmed if differ, rejected if equal.  Bounded
# by `D22_ARM_MAX = 4` total arms per boot plus the `F3_FIRE_CAP` per-
# slot fire bound.  Diagnostic-only; default builds remain byte-
# identical when off.  Depends on `firefox-test` (path gating + thread
# table), `w215-diag` (DR plumbing + handle_db_exception), and
# `ssp-canary-diag` (the `probe_gp_at_ssp_fail` hook site where the
# `[D22/SSP-CHECK]` read-time emission lives).  Refs:
# Intel SDM Vol. 3B §17.2.4 (DR0–DR3, DR7); §17.3.1.1 (data-breakpoint
# trap-after-retire); Intel SDM Vol. 3A §4.6 (page-table walk),
# §4.10.5 (TLB-coherency invariant); System V AMD64 ABI §3.2.2 (frame
# layout), §3.4.5.2 / §6.4 (SSP / `__stack_chk_guard` at fs:0x28);
# POSIX `vfork(3p)`; CWE-121.  Prior art: PR #248 (W215 H3a/H3b file-
# backed phys-alias), PR #356 (K2b two-channel `linear_watchpoint` +
# `phys_watchpoint` pattern), PR #404 (D21 linear-VA channel — same
# arm site), PR #407 (Wave 12 aether audit — convergent Mechanism D
# verdict).
d22-user-canary-phys = ["firefox-test", "w215-diag", "ssp-canary-diag"]
# F3 code-fetch (instruction-execute) DR0 watchpoint on the deterministic
# musl `__stack_chk_fail+0x0` user VA (PR #420 autopsy verdict).  When
# the parent PID 1 TID 2 thread retires the first instruction of the
# musl SSP-fail stub, the existing `[W215/DR-WATCH-FIRE]` line is
# joined by an `[F3/CODE-DR-FIRE]` block that dumps the full GPR
# snapshot, the 16 qwords above RSP, and the 4 qwords around RBP —
# pinpointing the caller-frame state at the moment SSP-fail is about
# to abort.  Compared to the D21/D22 data-watch channels (which name
# the *writer* of a corrupted canary slot), the code-DR fire names
# the *reader* and gives an authoritative caller-frame snapshot from
# which the saved-canary mismatch can be diffed against the parent's
# fs:0x28 master canary.  Arm is one-shot at the first PID 1 TID 2
# syscall after the `[VFORK/CANARY] post_wake.clone*` snapshot
# completes; disarms on first fire.  Diagnostic-only; default builds
# remain byte-identical when off.  Depends on `firefox-test` (path /
# pid gating) and `w215-diag` (DR0–DR3 + #DB plumbing).  Refs: Intel
# SDM Vol. 3B §17.2.4 (DR0–DR3, DR7 — RW=00 / LEN=00 instruction-
# breakpoint encoding), §17.3.1.1 (#DB on instruction fetch is a
# fault, taken before the instruction retires); Intel SDM Vol. 3A
# §6.15 (#DB vector 1); System V AMD64 ABI §3.4.1 (SSP); GCC manual
# §3.20 (-fstack-protector); PR #420 (autopsy verdict, byte-
# identical 2/2 reproduction), PR #417 (libxul SSP-shape audit).
f3-codeDR-watch = ["firefox-test", "w215-diag"]
# Track B (Phase 5, 2026-05-21) — stack-page write provenance ring.
# Records kernel-mode writes whose target user VA falls into the
# `[0x3f00_0000_0000, 0x4000_0000_0000)` thread-stack range (per Phase 4
# `phase_4_post_aslr_fs_base_trace_2026_05_21`, TID 7's `saved_slot` at
# `0x3f5e7c5850`).  Instrumented call sites: `alloc_vfork_child_stack`
# (vfork helper-stack seed), `alloc_vfork_child_tls` (vfork TLS init),
# `setup_user_stack` (initial-stack auxv/argv writes — out-of-window for
# the main-thread `USER_STACK_TOP=0x7fff_…`, but still recorded
# defensively).  Dumped at `[SSP-DIAG-STACK-PROV]` time keyed on
# `saved_slot_phys`.  Closes the kernel-direct-map blind spot of the
# `f3-watch` linear-VA DR0–DR3 channel (Intel SDM Vol. 3B §17.2.4 —
# hardware watchpoints trap on linear-VA only).  Two 256-entry rings
# (by-phys + sequential) × ~64 B/entry = ~32 KiB BSS.  Default builds
# remain byte-identical when this feature is OFF.
stack-prov = ["firefox-test", "ssp-canary-diag"]
# `[VMA-DUMP]` on fatal user-mode exceptions.  At each fatal user-mode
# #PF / #UD / #GP / #AC that terminates the process (no installed
# handler) the kernel emits a full enumeration of the trapping
# process's VMAs: base, end, size, prot, file/anon flags, name, and the
# physical frame backing the first page of each VMA.  This anchors PIE
# ASLR bases — with 28-bit per-exec entropy (1 TiB window) the libxul
# and ld-musl bases vary across boots, so an interpreter looking at a
# trapping RIP value cannot resolve "0x7f000001c7f9 is in ld-musl
# `__stack_chk_fail`" without the same-trial VMA layout.  Bounded to
# 4 dumps per boot × 256 VMAs/dump.  Default builds are byte-identical
# when this feature is off.  See Intel SDM Vol. 3A §6.15 (#GP), §4.5
# (4-Level Paging); POSIX mmap(2); ELF-64 gABI §3 (Program Loading).
vma-dump-on-gp = ["firefox-test"]
# Producer-side snapshot of every exiting thread keyed by (pid, tid), with a
# lookup at the kernel-mode fatal-trap site for cases where a sibling thread
# trapped in kernel mode at a very low RIP (< 0x10000) shortly after a
# sibling's CLEARTID + FUTEX_WAKE_EXIT.  The observable framing-falsifier is
# whether the most-recently-exited sibling's recorded clear-cr3 / clear-addr /
# saved-context-rsp aliases the trapping thread's kernel-stack VA range — only
# obtainable producer-side (at exit time, before reap) because the
# scheduler/reaper will have removed the dying thread's table entry by the
# time the trap fires.  Lossy ring of 16 entries per CPU; emission gated to
# the first 4 traps per boot.  Default builds remain byte-identical when this
# feature is OFF.  See Intel SDM Vol. 3A §6.15 (#GP), §4.5 (Paging); System V
# AMD64 ABI §3.4 (kernel-mode trap frame layout); POSIX clone(2)
# CLONE_CHILD_CLEARTID semantics.
kernel-gp-trap-diag = ["firefox-test"]
# Per-binary `[ELF/INIT-ARRAY]` emission at every kernel-side ELF load (main
# executable + ELF interpreter).  Records DT_INIT / DT_INIT_ARRAY /
# DT_PREINIT_ARRAY virtual addresses and reads the first four DT_INIT_ARRAY
# function pointers (with their backing physical frame + W215
# pte_share_count from PR #270) while the image is still hot.  Used as a
# framing-falsifier for the W215 saga: if fn_ptrs are NULL / non-text the
# constructor table was never relocated; if they look sane the bug is post-
# init (signal-frame corruption, aliasing-after-launch, etc.).  Bounded to
# the first 8 images per boot, then emits a single OVERFLOW marker.
# Default builds remain byte-identical when this feature is OFF.  See
# ELF gABI §5.7 (Initialization and Termination Functions), System V AMD64
# ABI §3.3.3 (`_init` semantics), and glibc `_dl_init` (publicly documented
# at <https://www.gnu.org/software/libc/manual/html_node/Dynamic-Linker-Hooks.html>).
elf-init-array-diag = ["firefox-test"]
# File-struct buf/buf_size corruption witness for the B-1 gate
# (ld-musl+0x44aeb NULL-deref in `memchr` called from `fgets`).
# Snapshots `[page_base+0x68, +0x78)` (the page offsets at which musl
# 1.2.5's FILE struct places `f->buf` and `f->buf_size` when the
# FILE lives at page-offset 0x10) on every `sys_read_linux` entry and
# exit, comparing the pair and emitting `[F_BUF_DELTA]` /
# `[F_BUF_ZERO]` lines when the field state matches the empirical
# fault pattern documented by the prior gate-ownership verdicts (K1+
# K2+K3 PASS but f->buf=NULL at memchr).  Default / firefox-test /
# test-mode builds remain byte-identical when this feature is OFF.
# Cite: musl public FILE layout (1.2.5), POSIX read(2), Intel SDM
# Vol. 3A §4.10.5 (TLB invariants).
file-buf-witness = ["firefox-test"]
# LLVM source-based code-coverage instrumentation (test-coverage audit
# session 5 / docs/TEST_COVERAGE_AUDIT_2026-05-16.md).  When enabled, the
# kernel must additionally be built with `-C instrument-coverage` (see
# scripts/qemu-harness.py `--features coverage` path, which sets RUSTFLAGS
# accordingly).  At test-suite exit the kernel walks the linker-delimited
# `__llvm_prf_cnts` / `__llvm_prf_data` / `__llvm_prf_names` sections plus
# the static `__llvm_covmap` / `__llvm_covfun` regions and emits the bytes
# as hex `[COV-CHUNK]` lines plus a `[COV-SUMMARY]` JSON line containing
# the region-level coverage percentage.  The harness's `coverage`
# subcommand parses these and produces a per-PR-friendly report.  Default
# / firefox-test / test-mode builds remain byte-identical when this
# feature is OFF.  See docs/HARNESS.md.
coverage = []
# INFRA-3 record/replay primitives (kernel/src/record_replay/).  Three
# coordinated mechanisms that make repeated runs of the same
# user-mode workload byte-deterministic enough to bisect a single
# failure offline:
#
#   1. Deterministic PRNG seed.  When this feature is on AND the QEMU
#      cmdline (passed via the `opt/astryx/cmdline` fw_cfg blob — see
#      QEMU `docs/specs/fw_cfg.txt`) contains an `astryx.rng_seed=<u64>`
#      token, every call to `crate::security::rand::rand_u64()` is
#      served from a per-boot xorshift64* PRNG seeded from that value.
#      ASLR offsets, AT_RANDOM aux-vector entry, getrandom(2) and any
#      other kernel RNG consumer therefore observe identical byte
#      sequences across runs with the same seed.  Default seed when the
#      cmdline is absent: 0xA577_E470_57ED_7E57.
#
#   2. Frozen virtual tick source.  A new `KERNEL_VIRTUAL_TICKS`
#      AtomicU64 advances exclusively on (a) syscall entry, (b) syscall
#      exit, (c) timer interrupt, (d) explicit `record-replay/advance`
#      KDB operations.  When this feature is on, `clock_gettime(2)`,
#      `gettimeofday(2)`, and the vDSO `monotonic_ns()` fallback path
#      all derive their result from `KERNEL_VIRTUAL_TICKS`, not from
#      TSC.  Same syscall sequence → same returned times.
#
#   3. Structured per-syscall record log.  Every Linux dispatch entry
#      emits a single self-describing `[SC-REC] {...}` JSON-shaped
#      serial line carrying pid, tid, sc#, all six args, user RIP at
#      entry, IA32_FS_BASE, vfork-generation id, and a strictly
#      increasing `ord` sequence ordinal tied to `KERNEL_VIRTUAL_TICKS`.
#      Two runs of the same workload with the same seed should produce
#      byte-identical `[SC-REC]` streams for the first ~500 records
#      (the validation target — see docs/RECORD_REPLAY_2026-05-23.md
#      for the full coverage list and known non-deterministic sources).
#
# Off by default and feature-gated end-to-end: when this flag is OFF
# the kernel binary is byte-identical to the pre-PR artefact (zero
# cmdline parse, zero virtual-tick counter, zero per-syscall record
# overhead).  When ON, the additional cost is one atomic increment per
# syscall + one ~150-byte serial line per syscall.
#
# Adds two KDB ops (read-only JSON, gated through the existing `kdb`
# feature when `record-replay` is also on):
#   - `record-status`  — current seed, virtual ticks, current ordinal
#   - `replay-dump`    — write the in-RAM record log to a VFS path
#
# Refs: QEMU `docs/specs/fw_cfg.txt` (firmware config selector at I/O
# ports 0x510/0x511); Intel SDM Vol. 1 §17.17 (Time-Stamp Counter);
# kernel.org `Documentation/timers/timekeeping.rst`; POSIX
# `clock_gettime(3)` and `getrandom(3)` (man-pages section 3).
record-replay = []

