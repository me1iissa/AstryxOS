# SSP-canary divergence diagnostic (kernel/src/subsys/linux/ssp_diag.rs).
# When a #GP from CPL 3 fires at a user-VA whose containing VMA is the
# musl dynamic linker (`/lib/ld-musl-x86_64.so.1`) at offset `0x1c7f9`
