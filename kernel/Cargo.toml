# SDM Vol. 3A §4.10 (TLB management); System V AMD64 ABI §6.4.
f3-watch = ["firefox-test", "ssp-canary-diag", "w215-diag"]
# FS_BASE preserve-across-execution probe
# (kernel/src/subsys/linux/fs_base_trace.rs).
# Records every kernel-side `WRMSR(IA32_FS_BASE)` (Intel SDM Vol. 3A
# §3.4.4.1, MSR `0xC000_0100`) into a per-boot ring keyed by
# `(cpu, pid, tid, old_fs, new_fs, caller_rip, sc_count, seq)`.  On a
# CPL-3 SSP-canary `#GP` (per Intel SDM Vol. 2A `HLT`/`RET` + Vol. 3A
# §6.15) the trapping TID's last ≤32 events are dumped immediately after
# the existing `[SSP-DIAG]` block — distinguishing the F3-Mode-B-1
# kernel-side FS.base-shift hypothesis (some scheduler / fork / signal
# return path changed FS.base between the libxul function's prologue
# `mov %fs:0x28, %rax` store and its epilogue re-read) from the
# `ax_eq_fs28 = 1` already-known "live FS.base agrees with itself at
# trap time" property — these are NOT the same question.
# Sites instrumented: `proc::write_fs_base()` (the canonical kernel
# API — covers context-switch via `restore_tls_for_current()` AND
# `enter_user_mode()` for boot/exec/fork bootstrap) and
# `subsys/linux/syscall::sys_arch_prctl(ARCH_SET_FS)` (the explicit
# user-mode write).  `proc/thread.rs::ret_from_fork_asm` is a
# naked_asm WRMSR that is not currently on the firefox-test fork path
# (see `proc/mod.rs::create_fork_process_impl`: uses `user_mode_bootstrap`
# instead) and is intentionally not instrumented in this revision.
# Ring sized at 1024 × ~40 B = 40 KiB BSS; per-trap dump capped at
# `FS_BASE_DUMP_MAX = 8` events per boot.  Default builds remain
# byte-identical when this feature is off.
# Refs: Intel SDM Vol. 3A §3.4.4.1 (`IA32_FS_BASE`); Intel SDM Vol. 2B
# (`SYSRETQ` — does NOT auto-reload MSRs); Intel SDM Vol. 3A §6.15
# (`#GP`); System V AMD64 ABI §6.4 (TLS variant II).
fs-base-trace = ["firefox-test", "ssp-canary-diag"]
# D7 PT_TLS BSS-slot writer trap (kernel/src/subsys/linux/d7_bss_watch.rs).
# Arms a write-only hardware watchpoint on the linear address
# `fs_base - 0x18` of the firefox-bin init thread (pid=1, tid=1)
# immediately after the first `proc::write_fs_base()` WRMSR transitions
# the MSR from zero to a non-zero TLS base.  The slot covers the 8-byte
# qword that the ELF gABI §5.2 PT_TLS zero-extension rule (the
# `memsz > filesz` BSS tail required to read as zero on first access)
# governs — for firefox-bin this is part of a `MemSiz=0x20, FileSiz=0`
# PT_TLS segment, so the slot MUST read as zero at the first user-mode
# instruction.  Every write hits `[W215/DR-WATCH-FIRE] kind_tag=3 …`,
# naming the writer RIP + CR3 + CS.  CS=0x23 means a CPL-3 (upstream)
# writer; CS=0x08 means a CPL-0 (kernel) writer — which would be
# dispositive of an AstryxOS kernel-side write to the user-VA after
# zero-init.  Bounded to the existing `F3_FIRE_CAP=32` per slot per
# boot.  Single arm per boot (`D7_ARM_MAX = 1`).
# Distinguishes Phase 4 hypothesis Z1 (anon-PF returned a non-zero
# frame, no runtime write) — falsified by zero captures — from
# Z2/Z3 (some writer reaches the slot post-init) — proved by
# captures naming the writer.
# Diagnostic-only; default builds remain byte-identical when off.
# Depends on `firefox-test` (the trace formatters share infra) and
# `w215-diag` (DR0–DR3 plumbing).
# Refs: Intel SDM Vol. 3B §17.2.4 (DR0–DR3, DR7), §17.3.1.1 (data-
# breakpoint trap timing); Intel SDM Vol. 3A §3.4.4.1 (`IA32_FS_BASE`);
# ELF gABI §5.2 (PT_LOAD / PT_TLS `memsz > filesz` zero-fill).
d7-bss-watch = ["firefox-test", "w215-diag"]
# D8 fault-time TLS-slot dump + phys-frame provenance
# (kernel/src/subsys/linux/d8_fault_tls_dump.rs).  Hooks the user-mode
# fatal-#PF path (idt.rs `handle_exception` vector 14) and on a
# fingerprint match (cr2=0x20, opcode prefix `49 8b 5e 20`
# = `mov 0x20(%r14), %rbx` per Intel SDM Vol. 2A §2.1, pid=1) emits a
# multi-line `[D8/FAULT-DUMP]` block containing the user-GPR state,
# the value of `[fs:-0x18]` AT FAULT TIME, the physical frame backing
# that VA, and FREE_SHADOW + ALLOC_SHADOW lookups on that phys frame
# (`w215_diag` PR #354 / Track K rings, reused by reference).
# Single-shot per boot (`D8_FIRE_MAX = 1`) — the sc=1171 fingerprint
# is deterministic, one capture dispositive.  D7 (`d7-bss-watch`,
# PR #371) catches *writes* to the slot; D8 is the orthogonal angle
# for the **Z1 — anon-mmap returned a non-zero frame on first read**
# survivor case where D7 records zero captures.  If the value at
# `[fs:-0x18]` at fault time is **zero**, Z1 is falsified.  If it is
# non-zero AND FREE_SHADOW hits, anon-PF returned a recycled frame
# without honouring the ELF gABI §5.2 PT_TLS BSS zero-fill contract
# (CWE-908).  If non-zero AND FREE_SHADOW empty, the slot was
# mutated by a path the W215 rings do not cover.  Diagnostic-only;
# default builds remain byte-identical when off.  Depends on
# `firefox-test` (trace formatters) and `w215-diag` (shadow rings).
# Refs: Intel SDM Vol. 3A §3.4.4 (`IA32_FS_BASE`), §4.10.5 (TLB);
# Intel SDM Vol. 2A §2.1 (Instruction Format); ELF gABI §5.2;
# POSIX mmap(2); CWE-908, CWE-401.
d8-tls-fault-dump = ["firefox-test", "w215-diag"]
