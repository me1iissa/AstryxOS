# D17 read-side aliasing test for the SSP-canary slot
# (kernel/src/subsys/linux/d17_aliasing_test.rs).  D16's two-channel
# coverage saw 32 fires on the canary slot, all CPL=3 user writers
# (the libxul / musl SSP prologue) — no CPL=0 kernel-mode writer on
# the PHYS_OFF channel.  That falsifies "kernel direct-map writer
# corrupts the slot between prologue and epilogue" but leaves one
# hypothesis open: the prologue write retired against phys `X` (the
# correct canary) and the epilogue's read resolves the same VA to
# phys `Y != X` (a residual page-table or TLB aliasing on the canary
# VA, W215-class but on a different VA).  D17 records (rip, va,
# phys, value) on every D16 fire (hooked from `handle_db_exception`
# on `kind_tag == WATCH_KIND_D16_CANARY`) and re-resolves the canary
# VA at SSP-fail `#GP` time from `ssp_diag::probe_gp_at_ssp_fail`.
# Four verdict shapes: D17-PHYS-DIFFER (read-side aliasing
# CONFIRMED — kernel PT/TLB bug, named target for fix);
# D17-PHYS-MATCH-VALUE-DIVERGED (D16 missed a writer); D17-PHYS-
# MATCH-VALUE-MATCH (no kernel-side anomaly — points to read
# instruction); D17-NO-WRITE-CAPTURED (D16 did not fire,
