# x86_64 psABI §6.4 TLS variant II), and the saved-canary slot in the
# SSP-instrumented caller's frame.  The pair of values discriminates
# whether the canary divergence is caused by the saved cookie being
# mutated externally (Mode A) or by the FS_BASE MSR itself shifting
# mid-function (Mode B).  Default builds are byte-identical when this
# feature is off.  Bounded emission (capped per boot) makes the hook
# safe in a soak loop.  See POSIX sigaction(2), Intel SDM Vol. 3A §6.15
# (#GP) + §3.4.4.1 (IA32_FS_BASE), System V AMD64 ABI §6.4.
