name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

# Cancel in-flight runs on the same PR when a new push lands
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-check:
    name: cargo check (fmt + clippy tolerant)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (matching rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview, rustfmt
          targets: x86_64-unknown-uefi, x86_64-unknown-none

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-check-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-check-${{ runner.os }}-

      # Check each package with its correct target. The kernel is a no_std bare-metal
      # crate that requires -Zbuild-std; checking it against the host target (linux-gnu)
      # causes a duplicate panic_impl error because std also defines a panic handler.
      - name: cargo check (astryx-shared)
        run: cargo +nightly check -p astryx-shared

      - name: cargo check (astryx-boot, UEFI target)
        run: cargo +nightly check -p astryx-boot --target x86_64-unknown-uefi

      - name: cargo check (astryx-kernel, bare-metal target)
        run: >
          cargo +nightly check -p astryx-kernel
          --target kernel/x86_64-astryx.json
          -Zbuild-std=core,alloc
          -Zbuild-std-features=compiler-builtins-mem
          -Zjson-target-spec

      - name: rustfmt (advisory only — won't fail the build)
        run: cargo +nightly fmt --all -- --check || true

      # PR #127 caveat: enforce the fault-immunity contract for
      # `ke::bugcheck` and `util::no_alloc_fmt` — these two files must
      # remain allocator-free and serial-mutex-free.  A grep-based
      # lint is sufficient: any `format!`, `String`, `Box`,
      # `serial_println!`, `vec!`, `panic!`, or `alloc::*` use here
      # silently defeats the bugcheck banner contract.  Failing this
      # step gates the PR.
      - name: check fault-immunity tokens (ke::bugcheck + no_alloc_fmt)
        run: bash scripts/check_fault_immune.sh

  feature-combo-check:
    # Compile-check (cargo check level — no codegen/link, NO QEMU boot) the
    # firefox-test* kernel feature combinations that the plain `cargo-check` job
    # never exercises.  `cargo-check` only checks astryx-kernel with DEFAULT
    # features, so every path behind `firefox-test-core` / `firefox-test-trace`
    # / `firefox-trace-verbose` / `syscall-trace` / `kdb` (and the diagnostic
    # emitters those pull in) ships compile-UNVERIFIED: a feature-gated syntax
    # or type error stays invisible until someone builds that exact flag set by
    # hand.  Each matrix leg is one `cargo check --features <combo>` against the
    # bare-metal kernel target — fast, and a HARD gate (compile checks have no
    # flake surface, unlike the QEMU kernel-smoke job).
    #
    # Failure mode this prevents: feature-gated code (e.g. an opt-in trace
    # emitter, or a firefox-test-core/-trace profile-split move) that compiles
    # under `default`/`test-mode` but fails under a `firefox-test*` combo,
    # landing green and only breaking when an agent boots that flag set.
    #
    # `fail-fast: false` so one broken combo reports without cancelling the
    # others (you want to see every failing combo, not just the first).
    name: feature-combo check (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kdb
            features: kdb
          - name: ff-core-kdb
            features: firefox-test-core,kdb
          - name: ff-trace-kdb
            features: firefox-test-trace,kdb
          - name: ff-core-verbose-kdb
            features: firefox-test-core,firefox-trace-verbose,kdb
          - name: ff-bundle
            features: firefox-test
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (matching rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-uefi, x86_64-unknown-none

      # One shared cache across the legs: the expensive artefact is the built
      # `core`/`alloc` sysroot (-Zbuild-std) + the registry, which is identical
      # for every combo — only the single astryx-kernel crate re-checks per
      # combo (cheap, no codegen).  Legs race to save the same key; a duplicate
      # save is a harmless no-op.  Falls back to the cargo-check cache so a first
      # run still restores a warm build-std.
      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: feature-combo-${{ runner.os }}-${{ hashFiles('Cargo.lock','kernel/x86_64-astryx.json') }}
          restore-keys: |
            feature-combo-${{ runner.os }}-
            cargo-check-${{ runner.os }}-

      # Same bare-metal invocation as the `cargo-check` job (the kernel is
      # no_std + a custom JSON target and needs -Zbuild-std; checking it against
      # the host target trips a duplicate panic_impl), plus the combo under test.
      - name: cargo check (astryx-kernel, --features ${{ matrix.features }})
        run: >
          cargo +nightly check -p astryx-kernel
          --target kernel/x86_64-astryx.json
          --features ${{ matrix.features }}
          -Zbuild-std=core,alloc
          -Zbuild-std-features=compiler-builtins-mem
          -Zjson-target-spec

  tooling-smoke:
    # Host-only smoke tests for the dev-dashboard tooling (no kernel build, no
    # QEMU boot — pure Python against synthetic + real serial-log fixtures, <10s
    # total). Gates the PR on the dashboard parsers/derivations staying correct:
    #   * serial-web-smoke.py     — the serial monitor's endpoints + per-gate
    #                               TIMING (elapsed/delta from the marks sidecar
    #                               and the kernel-tick derivation).
    #   * perf-bench-smoke.py     — the perf taxonomy, import-logs, AND the
    #                               ingest-marks bridge (gate marks -> a
    #                               time-series record the perf dashboard reads).
    #   * perf-baseline-linux-smoke.py — the Linux-baseline record shape.
    # Failure mode this prevents: a regression in the gate<->phase mapping, the
    # tick->ms derivation, or the marks-sidecar schema silently corrupting the
    # numbers BOTH dashboards display, with no kernel-boot job to catch it.
    name: tooling smoke (host-only dashboards)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: serial-web smoke (serial monitor + per-gate timing + wire panel)
        run: python3 scripts/serial-web-smoke.py
      - name: pcap-decode selftest (wire summary parser)
        # Crafts + decodes a synthetic libpcap (DNS query + TLS ClientHello/SNI)
        # entirely in-process and asserts the structured wire facts come out.
        # Failure mode this prevents: a regression in the libpcap/Ethernet/IP/
        # TCP/DNS/TLS parsing that the /api/wire endpoint relies on, silently
        # corrupting the decoded "what's on the wire" view with no kernel boot.
        run: python3 scripts/pcap_decode.py --selftest
      - name: perf-bench smoke (taxonomy + ingest-marks bridge)
        run: python3 scripts/perf-bench-smoke.py
      - name: perf baseline-linux smoke (record shape)
        run: python3 scripts/perf-baseline-linux-smoke.py
      # Host-only subset of the harness smoke: the data.img staleness detector,
      # the ci/allow-fail allowlist, the snap-gate/blk-trace CLI surfaces, the
      # PNG decoders, AND the livelock auto-reap detector (LivelockDetector +
      # the pid=1 PROC-METRICS sc regex + the new `start` flags). No QEMU boot.
      # Failure mode this prevents: a refactor silently breaking the livelock
      # guard so a spinning FF render boot pins a host core indefinitely.
      - name: qemu-harness host-only smoke (staleness + livelock reap)
        run: python3 scripts/qemu-harness-smoke.py --staleness-only
      # Boot-free smoke for the `health` circle/spin/stall classifier (the
      # coordinator runs it every turn, so a regression cascades into every
      # dispatch). Layer 1 pins _health_classify's verdict for all six classes
      # over fixture sample-pairs (incl. the load-bearing "firehose-throttled
      # boot reads SLOW-ALIVE, never reaped" invariant); Layer 2 drives the
      # `health <sid>` / `health --all --reap-circles` argv over synthetic
      # serial logs and asserts the JSON contract + that --reap-circles stops
      # AND logs (never silently) exactly the four circle classes.
      # Failure mode this prevents: a refactor flipping a verdict so health
      # either reaps a HEALTHY/SLOW-ALIVE boot or fails to reap a wedged one.
      - name: health smoke (circle/spin/stall classifier + reap contract)
        run: python3 scripts/health-smoke.py
      # Boot-free smoke for the GUI-cache image-provisioning tool
      # (patch-gui-caches.sh).  Exercises arg validation, the built-in-loaders
      # fallback, and — the load-bearing path — the debugfs injection of the
      # three windowed-Firefox runtime caches (loaders.cache / gschemas.compiled
      # / mime.cache) into a scratch ext2 image, asserting byte-identical
      # readback AND that e2fsck still reports the image clean.
      # Failure mode this prevents: a regression in the cache-injection path
      # that silently ships a --ff-gui data image without the GdkPixbuf /
      # GSettings / MIME caches the kernel's windowed launch path points at, or
      # one that corrupts the ext2 image while patching it.
      - name: patch-gui-caches smoke (image cache provisioning + ext2 integrity)
        run: python3 scripts/patch-gui-caches-smoke.py
      # Boot-free smoke for the software-GL (Mesa llvmpipe) image-provisioning
      # tool (patch-gui-gl.sh).  Exercises arg validation, --verify on a GL-less
      # image (must report the closure incomplete + exit non-zero), and — the
      # load-bearing path — the debugfs injection of the libGL/libEGL closure
      # (incl. the llvmpipe DRI driver under xorg/modules/dri/) into a scratch
      # ext2 image, asserting byte-identical readback, that e2fsck still reports
      # the image clean, and that a follow-up --verify then passes.
      # Failure mode this prevents: a --ff-gui data image that ships GL-less
      # (glxtest "libGL.so.1 missing" → content compositor child cannot bring up
      # a software OpenGL context → CompositorBridgeChild AbnormalShutdown → no
      # render), or an injection path that corrupts the ext2 image.
      - name: patch-gui-gl smoke (software-GL image provisioning + ext2 integrity)
        run: python3 scripts/patch-gui-gl-smoke.py
      # Boot-free smoke for the create-data-disk.sh write-safety guard.  Drives
      # the script in a throwaway isolated tree (no staging, ~2s) and asserts
      # the three guards from the 2026-07-16 incident: (a) regen builds to a
      # temp file and renames(2) over the target so a process holding the old
      # image open keeps reading it; (b) a held-open target is refused (exit 3)
      # unless --force-inuse; (c) a data.img symlinked to a target outside the
      # tree is refused with no override, while a within-tree symlink is honored
      # and its resolved target replaced atomically.  Self-skips any sub-check
      # whose tool (mke2fs / fuser|lsof) is absent so a minimal runner can't
      # false-fail.  Failure mode this prevents: a refactor re-introducing the
      # in-place / write-through-symlink regen that clobbered a shared data.img
      # under running QEMU sessions.
      - name: create-data-disk write-safety smoke (atomic rename + refuse guards)
        run: bash scripts/create-data-disk-safety-smoke.sh

  kernel-build:
    name: bootloader + kernel builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-uefi, x86_64-unknown-none

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Cache cargo + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kernel-build-${{ runner.os }}-${{ hashFiles('Cargo.lock','kernel/x86_64-astryx.json') }}
          restore-keys: |
            kernel-build-${{ runner.os }}-

      - name: ./build.sh release
        run: bash build.sh release

      - name: Report build artifacts
        run: |
          ls -lh build/ || true
          echo "Disk image size:"
          stat -c '%s' build/astryx-os.img 2>/dev/null || echo "(no image built)"

  kernel-smoke:
    name: kernel smoke (QEMU boot + test suite)
    runs-on: ubuntu-latest
    needs: kernel-build
    # Raised from 20 to cover the bounded retry below (up to 3 × 900s boots in
    # the worst all-flake case). The happy path is a single ~3–4 min attempt.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (matching rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-uefi, x86_64-unknown-none

      - name: Install QEMU + OVMF + e2fsprogs + musl-tools
        run: |
          sudo apt-get update
          # musl-tools provides musl-gcc for compiling the hello + mmap_test
          # static ELF fixtures that test_musl_hello / test_sigchld / test_ascension
          # read from /disk/bin/.  busybox-static is NOT installed: the Ubuntu
          # package may ship a PT_INTERP-bearing binary that fails in-kernel;
          # the Alpine-rootfs path (install-busybox-cli.sh) is authoritative.
          sudo apt-get install -y qemu-system-x86 ovmf e2fsprogs musl-tools
          # Fail fast if mke2fs -d is not supported (requires e2fsprogs >= 1.43).
          mke2fs -V
          # Fix up OVMF paths — Ubuntu ships 4M variants under /usr/share/OVMF/
          # but some base images only install /usr/share/ovmf/OVMF.fd.  Both
          # watch-test.py and qemu-harness.py expect OVMF_CODE_4M.fd.
          if [ ! -e /usr/share/OVMF/OVMF_CODE_4M.fd ]; then
            sudo install -d /usr/share/OVMF
            for f in /usr/share/OVMF/OVMF_CODE.fd /usr/share/ovmf/OVMF.fd; do
              if [ -e "$f" ]; then
                sudo cp "$f" /usr/share/OVMF/OVMF_CODE_4M.fd
                break
              fi
            done
          fi
          if [ ! -e /usr/share/OVMF/OVMF_VARS_4M.fd ]; then
            for f in /usr/share/OVMF/OVMF_VARS.fd; do
              if [ -e "$f" ]; then
                sudo cp "$f" /usr/share/OVMF/OVMF_VARS_4M.fd
                break
              fi
            done
          fi
          ls -l /usr/share/OVMF/

      - name: Cache cargo + target (shares key with kernel-build)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kernel-build-${{ runner.os }}-${{ hashFiles('Cargo.lock','kernel/x86_64-astryx.json') }}
          restore-keys: |
            kernel-build-${{ runner.os }}-

      # Build the kernel with `test-mode` so the runner dispatches the
      # automated suite instead of launching the shell.  `network-tests`
      # is intentionally off in CI: QEMU SLIRP drops external ICMP
      # without CAP_NET_ADMIN, so those four tests would soft-pass
      # uninformatively.  See kernel/Cargo.toml.
      - name: Build kernel (test-mode)
        run: |
          cargo +nightly build \
            --package astryx-kernel \
            --target kernel/x86_64-astryx.json \
            --profile release \
            --features test-mode \
            -Zbuild-std=core,alloc \
            -Zbuild-std-features=compiler-builtins-mem \
            -Zjson-target-spec

      - name: Build bootloader (UEFI)
        run: cargo +nightly build --package astryx-boot --target x86_64-unknown-uefi --profile release

      # watch-test.py with --no-build takes care of staging the ESP,
      # running objcopy to turn the ELF into a flat binary, and
      # launching QEMU with the isa-debug-exit device.
      - name: Stage ESP for watch-test
        run: |
          mkdir -p build/esp/EFI/BOOT build/esp/EFI/astryx
          cp target/x86_64-unknown-uefi/release/astryx-boot.efi build/esp/EFI/BOOT/BOOTX64.EFI
          SYSROOT=$(rustc +nightly --print sysroot)
          OBJCOPY=$(find "$SYSROOT" -name llvm-objcopy | head -1)
          [ -n "$OBJCOPY" ] || OBJCOPY=llvm-objcopy
          "$OBJCOPY" -O binary target/x86_64-astryx/release/astryx-kernel build/esp/EFI/astryx/kernel.bin
          ls -lh build/esp/EFI/astryx/kernel.bin

      # Build TCC (TinyCC) from the in-tree source so /disk/bin/tcc is present
      # for test_tcc_compile.  musl-gcc (from musl-tools, installed above) is
      # required; the build is fast (~15 s).  Failure is non-fatal: the test
      # is in the allow-fail list and the kernel smoke can still pass without it.
      - name: Build TCC fixture (non-fatal)
        run: |
          bash scripts/build-tcc.sh || echo "[ci] build-tcc.sh failed; tcc fixture absent (test_tcc_compile allow-failed)"

      - name: Create data disk (ext2)
        run: ./scripts/create-data-disk.sh --force

      # Headless kernel boot + full test suite.  Exit code 0 means all
      # tests passed; anything else fails the job.  GitHub runners have
      # no /dev/kvm, so expect ~8–15 minutes without KVM acceleration.
      #
      # The allow-fail list is structured: ci/allow-fail.json carries one
      # entry per tolerated [FAIL], each with a reason and tracking
      # reference.  `qemu-harness.py allowlist regex` renders it into the
      # regex consumed by `ci-run --allow-fail`.  Anything not in the list
      # still gates the job.  Use `allowlist add/remove` to update (no need
      # to edit this workflow file when an entry shifts).
      #
      # Note: we keep using watch-test.py here to preserve historical exit
      # code shape (the CI parser expects the watch-test output banner);
      # ci-run is exposed for parity and used by `soak`.  Migrating fully
      # to `ci-run` is tracked separately.
      - name: Render allow-fail regex from ci/allow-fail.json
        id: allowlist
        run: |
          set -euo pipefail
          REGEX=$(python3 scripts/qemu-harness.py allowlist regex)
          # Defence-in-depth: refuse to spliced an empty regex into the next
          # step's --allow-fail "\[FAIL\] (REGEX)" template.  Empty would
          # become "\[FAIL\] ()" which matches every [FAIL] line and turns
          # a wiped or malformed allowlist into a silent green build.  The
          # harness emits a never-match sentinel `(?!)` for the empty case
          # so this branch is a guard against future render regressions.
          if [ -z "$REGEX" ]; then
            echo "[ci] FATAL: allowlist regex rendered empty — aborting." >&2
            echo "[ci] Splicing an empty regex into '\\[FAIL\\] (REGEX)' would" >&2
            echo "[ci] match every [FAIL] line and produce a silently green CI." >&2
            exit 1
          fi
          # GHA: write to GITHUB_OUTPUT so the next step can use it
          {
            echo "regex<<EOF"
            echo "$REGEX"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          NUM=$(python3 -c 'import json,sys; print(len(json.load(open("ci/allow-fail.json"))["entries"]))')
          echo "[ci] rendered allow-fail regex from $NUM entries"

      # ── INTERIM: required gate pinned to SMP=1 (single vCPU) ──────────────
      # The default boot is SMP=2. A parked content-corruption race (W215
      # class: a fire-and-forget cross-CPU in-place writer corrupts a live
      # frame — a code page ends up holding string bytes, executing it faults)
      # is SMP=2-specific in test-mode. It was AMPLIFIED by XSAVE+AVX (vector
      # stores widen the race window), which turned an occasional flake into a
      # ~90%-fail gate that blocked ALL merges (docs PRs included). The SMP=1
      # test-mode suite is confirmed clean (0 kernel faults). Pinning the
      # REQUIRED gate to one vCPU unblocks the merge queue while the root fix
      # is being developed. SMP=2 coverage is preserved by the separate,
      # non-blocking `kernel-smoke-smp2` job below.
      #
      # TODO(revert) #714: once the W215 root fix lands and SMP=2 test-mode
      # boots clean, DROP the `ASTRYX_SMP: "1"` env here AND delete the
      # `kernel-smoke-smp2` job. Tracked in issue #714 ("kernel-smoke SMP=2
      # W215 content-corruption flake (AVX-amplified)"). This masks a KNOWN,
      # actively-fixed bug — it is not a silent quality drop.
      # Bounded retry (belt-and-suspenders on top of the SMP=1 pin). SMP=1
      # is the primary lever, but the underlying W215 corruption is flaky by
      # nature, so a small residual crash/hang rate can survive even at one
      # vCPU. This retry is EXIT-CODE-PRECISE so it never masks a real
      # regression: watch-test.py returns 0=pass, 1=real (non-allow-listed)
      # test failure, 2=hung, 3=hard-timeout, 4=crash. We fail FAST on 1 (a
      # genuine test regression must gate) and retry ONLY the infra/kernel-fault
      # classes (2/3/4) — i.e. exactly the W215-timeout/double-fault signature.
      # First attempt passes in ~3–4 min on a clean runner, so the happy path
      # is unchanged; retries only cost time on an actual flake.
      - name: Run headless test suite (SMP=1, bounded retry on W215 flake)
        env:
          ASTRYX_SMP: "1"
        run: |
          set +e
          ATTEMPTS=3
          for a in $(seq 1 "$ATTEMPTS"); do
            echo "[ci] kernel-smoke SMP=1 attempt $a/$ATTEMPTS"
            python3 scripts/watch-test.py --no-build --hard-timeout 900 \
              --allow-fail "\[FAIL\] (${{ steps.allowlist.outputs.regex }})"
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "[ci] kernel-smoke passed on attempt $a"
              exit 0
            fi
            if [ "$rc" -eq 1 ]; then
              echo "[ci] attempt $a: real (non-allow-listed) test failure (rc=1) — NOT retrying, this must gate."
              exit 1
            fi
            # rc in {2,3,4,5}: hung / hard-timeout / crash / other — the
            # W215-class kernel-fault flake. Preserve the log and retry.
            echo "[ci] attempt $a: non-test flake (watch-test rc=$rc — 2=hung 3=hard-timeout 4=crash) — retrying"
            [ -f build/test-serial.log ] && cp build/test-serial.log "build/test-serial.attempt$a.log" || true
          done
          echo "[ci] exhausted $ATTEMPTS attempts, all hit the W215-class kernel-fault flake — failing the gate."
          exit 1

      - name: Allowlist drift check (informational, always runs)
        # If any allowlist entry did NOT match a failure this run, flag it
        # — the underlying gap may have closed and the entry can come out.
        # Informational only: does not fail the job.
        if: always()
        run: |
          set -uo pipefail
          # Prefer the harness session log (when ci-run is used in future);
          # fall back to watch-test's build/test-serial.log.
          for c in ~/.astryx-harness/*.serial.log build/test-serial.log; do
            for f in $c; do
              if [ -e "$f" ]; then
                echo "[ci] drift check against $f"
                python3 scripts/qemu-harness.py allowlist check --serial-log "$f" || true
                exit 0
              fi
            done
          done
          echo "[ci] no serial log found — skipping drift check"

      - name: Upload serial logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-smoke-logs
          path: |
            build/test-serial.log
            build/test-serial.attempt*.log
            ~/.astryx-harness/*.serial.log
          retention-days: 7
          if-no-files-found: ignore

  # ── INTERIM, NON-BLOCKING: SMP=2 kernel smoke (expected-red while W215 open) ──
  # Preserves the SMP=2 (dual-vCPU) test-mode signal that the required
  # `kernel-smoke` job gave up when it was pinned to SMP=1 (see the TODO(revert)
  # in that job). This job is NOT a merge gate:
  #   * `continue-on-error: true` — a failure is reported but never fails the run.
  # It is expected to stay RED until the W215 content-corruption root fix lands;
  # when it flips GREEN that is the signal the required job can be un-pinned and
  # THIS job deleted (tracked in issue #714).
  #
  # To avoid burning ~15+ min of TCG runner time on a known-red boot for every
  # PR (including trivial docs PRs), this job runs only on pushes to master and
  # on manual `workflow_dispatch`. A PR author verifying a candidate W215 fix
  # can trigger it via workflow_dispatch, or (preferred) verify at SMP=2 locally
  # through scripts/qemu-harness.py.
  #
  # TODO(revert) #714: DELETE this entire job once SMP=2 test-mode boots clean.
  kernel-smoke-smp2:
    name: kernel smoke SMP=2 (non-blocking, W215-expected-red)
    runs-on: ubuntu-latest
    needs: kernel-build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (matching rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-uefi, x86_64-unknown-none

      - name: Install QEMU + OVMF + e2fsprogs + musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf e2fsprogs musl-tools
          mke2fs -V
          if [ ! -e /usr/share/OVMF/OVMF_CODE_4M.fd ]; then
            sudo install -d /usr/share/OVMF
            for f in /usr/share/OVMF/OVMF_CODE.fd /usr/share/ovmf/OVMF.fd; do
              if [ -e "$f" ]; then
                sudo cp "$f" /usr/share/OVMF/OVMF_CODE_4M.fd
                break
              fi
            done
          fi
          if [ ! -e /usr/share/OVMF/OVMF_VARS_4M.fd ]; then
            for f in /usr/share/OVMF/OVMF_VARS.fd; do
              if [ -e "$f" ]; then
                sudo cp "$f" /usr/share/OVMF/OVMF_VARS_4M.fd
                break
              fi
            done
          fi
          ls -l /usr/share/OVMF/

      - name: Cache cargo + target (shares key with kernel-build)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kernel-build-${{ runner.os }}-${{ hashFiles('Cargo.lock','kernel/x86_64-astryx.json') }}
          restore-keys: |
            kernel-build-${{ runner.os }}-

      - name: Build kernel (test-mode)
        run: |
          cargo +nightly build \
            --package astryx-kernel \
            --target kernel/x86_64-astryx.json \
            --profile release \
            --features test-mode \
            -Zbuild-std=core,alloc \
            -Zbuild-std-features=compiler-builtins-mem \
            -Zjson-target-spec

      - name: Build bootloader (UEFI)
        run: cargo +nightly build --package astryx-boot --target x86_64-unknown-uefi --profile release

      - name: Stage ESP for watch-test
        run: |
          mkdir -p build/esp/EFI/BOOT build/esp/EFI/astryx
          cp target/x86_64-unknown-uefi/release/astryx-boot.efi build/esp/EFI/BOOT/BOOTX64.EFI
          SYSROOT=$(rustc +nightly --print sysroot)
          OBJCOPY=$(find "$SYSROOT" -name llvm-objcopy | head -1)
          [ -n "$OBJCOPY" ] || OBJCOPY=llvm-objcopy
          "$OBJCOPY" -O binary target/x86_64-astryx/release/astryx-kernel build/esp/EFI/astryx/kernel.bin
          ls -lh build/esp/EFI/astryx/kernel.bin

      - name: Build TCC fixture (non-fatal)
        run: |
          bash scripts/build-tcc.sh || echo "[ci] build-tcc.sh failed; tcc fixture absent (test_tcc_compile allow-failed)"

      - name: Create data disk (ext2)
        run: ./scripts/create-data-disk.sh --force

      - name: Render allow-fail regex from ci/allow-fail.json
        id: allowlist
        run: |
          set -euo pipefail
          REGEX=$(python3 scripts/qemu-harness.py allowlist regex)
          if [ -z "$REGEX" ]; then
            echo "[ci] FATAL: allowlist regex rendered empty — aborting." >&2
            exit 1
          fi
          {
            echo "regex<<EOF"
            echo "$REGEX"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Same suite as the required job, but at SMP=2 (dual vCPU). This is the
      # configuration that hits the parked W215 content-corruption race, so a
      # failure here is expected and does NOT gate merges (continue-on-error).
      - name: Run headless test suite (SMP=2)
        env:
          ASTRYX_SMP: "2"
        run: |
          python3 scripts/watch-test.py --no-build --hard-timeout 900 \
            --allow-fail "\[FAIL\] (${{ steps.allowlist.outputs.regex }})"

      - name: Upload serial logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-smoke-smp2-logs
          path: |
            build/test-serial.log
            ~/.astryx-harness/*.serial.log
          retention-days: 7
          if-no-files-found: ignore

  harness-smoke:
    # Validates scripts/qemu-harness.py (and therefore scripts/astryx_qemu.py,
    # the canonical QEMU argv builder) by driving a real kernel boot through
    # the harness and checking that every Tier 1 subcommand returns the
    # expected JSON shape. Previously `qemu-harness-smoke.py` was invoked by
    # nothing and silently rotted (audit MED-6).
    name: qemu-harness smoke (tier 1)
    runs-on: ubuntu-latest
    needs: kernel-build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (matching rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-uefi, x86_64-unknown-none

      - name: Install QEMU + OVMF + e2fsprogs + musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf e2fsprogs musl-tools
          mke2fs -V
          if [ ! -e /usr/share/OVMF/OVMF_CODE_4M.fd ]; then
            sudo install -d /usr/share/OVMF
            for f in /usr/share/OVMF/OVMF_CODE.fd /usr/share/ovmf/OVMF.fd; do
              if [ -e "$f" ]; then
                sudo cp "$f" /usr/share/OVMF/OVMF_CODE_4M.fd
                break
              fi
            done
          fi
          if [ ! -e /usr/share/OVMF/OVMF_VARS_4M.fd ]; then
            for f in /usr/share/OVMF/OVMF_VARS.fd; do
              if [ -e "$f" ]; then
                sudo cp "$f" /usr/share/OVMF/OVMF_VARS_4M.fd
                break
              fi
            done
          fi

      - name: Cache cargo + target (shares key with kernel-build)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kernel-build-${{ runner.os }}-${{ hashFiles('Cargo.lock','kernel/x86_64-astryx.json') }}
          restore-keys: |
            kernel-build-${{ runner.os }}-

      - name: Build kernel (test-mode)
        run: |
          cargo +nightly build \
            --package astryx-kernel \
            --target kernel/x86_64-astryx.json \
            --profile release \
            --features test-mode \
            -Zbuild-std=core,alloc \
            -Zbuild-std-features=compiler-builtins-mem \
            -Zjson-target-spec

      - name: Build bootloader (UEFI)
        run: cargo +nightly build --package astryx-boot --target x86_64-unknown-uefi --profile release

      - name: Stage ESP
        run: |
          mkdir -p build/esp/EFI/BOOT build/esp/EFI/astryx
          cp target/x86_64-unknown-uefi/release/astryx-boot.efi build/esp/EFI/BOOT/BOOTX64.EFI
          SYSROOT=$(rustc +nightly --print sysroot)
          OBJCOPY=$(find "$SYSROOT" -name llvm-objcopy | head -1)
          [ -n "$OBJCOPY" ] || OBJCOPY=llvm-objcopy
          "$OBJCOPY" -O binary target/x86_64-astryx/release/astryx-kernel build/esp/EFI/astryx/kernel.bin

      - name: Create data disk
        run: ./scripts/create-data-disk.sh --force

      # Exercises start/wait/tail/status/grep/events/stop/list against a
      # real boot. Tier 2 (GDB stub) is skipped here — it needs a KVM
      # stop-reply that GitHub runners can be flaky about. Tier 1 alone
      # is enough to catch argv drift in astryx_qemu.py.
      - name: Run qemu-harness smoke
        run: python3 scripts/qemu-harness-smoke.py --no-build

      - name: Upload harness logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: harness-smoke-logs
          path: |
            ~/.astryx-harness/*.serial.log
            ~/.astryx-harness/*.events.jsonl
          retention-days: 7
          if-no-files-found: ignore
