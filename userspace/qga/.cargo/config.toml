# Per-crate cargo config for the QGA daemon.
#
# We disable PIE/relocations so the resulting ELF can be loaded by the
# kernel's minimal ELF loader (kernel/src/proc/elf.rs), which only knows
# how to apply DT_RELR — not the general RELA path that PIE binaries on
# x86_64-unknown-none emit by default.
#
# The kernel loader maps PT_LOAD segments at their stored p_vaddr (no bias),
# which is exactly what an ET_EXEC needs.

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-args=-static",
]
