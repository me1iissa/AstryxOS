# Per-crate cargo config for the native-hello sample.
#
# Disable PIE/relocations so the resulting ELF can be loaded by the kernel's
# minimal ELF loader (kernel/src/proc/elf.rs), which maps PT_LOAD segments at
# their stored p_vaddr with no bias (ET_EXEC) and does not apply the general
# x86_64 RELA relocation path.  Same constraint as the QGA daemon.

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-args=-static",
]
